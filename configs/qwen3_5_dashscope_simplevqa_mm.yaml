# DashScope OpenAI-compatible API config for SimpleVQA multimodal evaluation.
# This config does not require a local Qwen3.5 checkpoint or vLLM server.
# It sends local SimpleVQA images as base64 data URLs.

run:
  name: qwen3_5_dashscope_simplevqa_mm
  task: multimodal_visual_question_answering_api
  output_dir: runs/qwen3_5_dashscope_simplevqa_mm
  seed: 42
  max_samples: null
  resume: true
  request_concurrency: 4

model:
  name: ${MODEL_NAME:-qwen3.5-35b-a3b}
  modality: image_text_to_text
  vision_input: supported
  provider: dashscope_openai_compatible
  base_url: ${MODEL_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  base_urls:
    - ${MODEL_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  api_key: null
  api_key_env: ${MODEL_API_KEY_ENV:-DASHSCOPE_API_KEY}
  served_model_name: ${MODEL_NAME:-qwen3.5-35b-a3b}

generation:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 128
  stop: []
  extra_body:
    enable_thinking: false

dataset:
  name: SimpleVQA
  repo_id: m-a-p/SimpleVQA
  root: ${SIMPLEVQA_ROOT:-./datasets/SimpleVQA}
  annotation_file: ${SIMPLEVQA_ANNOTATION_FILE:-./datasets/SimpleVQA/simpleVQA_final_modified.json}
  image_root: ${SIMPLEVQA_IMAGE_ROOT:-./datasets/SimpleVQA/simpleVQA_datasets}
  image_archive: ${SIMPLEVQA_IMAGE_ARCHIVE:-./datasets/SimpleVQA/simpleVQA_datasets.zip}
  split: test

  field_candidates:
    question:
      - question
    image:
      - image
    answer:
      - answer
    id:
      - data_id

input:
  mode: image_and_question
  include_image: true
  image_transport: local_file_base64
  image_mime_type: image/jpeg
  image_path_template: "{image_root}/{image}"
  missing_image_policy: error
  note: JSON image paths such as CCSimpleQA/4.jpg are resolved under dataset.image_root.

prompt:
  system: |
    You are a visual question answering evaluator.
    Answer using the image and the question.
    Output only the shortest correct answer.
    Do not include reasoning, explanation, markdown, or extra words.
    If the answer cannot be determined from the image, output "unknown".
  user_template: |
    {question}

evaluation:
  prediction_file: predictions.jsonl
  metrics_file: metrics.json
  normalize_answer: true
  metrics:
    - exact_match
    - relaxed_exact_match

agent:
  max_tool_iterations: 4
  max_consecutive_tool_errors: 0
  enable_thinking: true
  stream: true
  max_tokens: 1024
  tools:
    search:
      enabled: true
    browsergym:
      enabled: false
    code_execution:
      enabled: true
