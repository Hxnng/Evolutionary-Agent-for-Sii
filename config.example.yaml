agent:
  name: my-agent
  max_tool_iterations: 6
  max_consecutive_tool_errors: 3

runtime:
  home: .my-agent
  checkpoint: json

model:
  provider: ${MODEL_PROVIDER:-dashscope}
  base_url: ${MODEL_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  name: ${MODEL_NAME:-qwen3.5-35b-a3b}
  api_key_env: ${MODEL_API_KEY_ENV:-DASHSCOPE_API_KEY}

sandbox:
  use: local
  image: python:3-slim
  timeout: 60

tools:
  search:
    enabled: true
    providers:
      - tavily
      - ddg_search
      - serper
      - jina_ai
      - infoquest
      - firecrawl
      - exa
      - image_search
  browsergym:
    enabled: false
    env_id: browsergym/openended
    start_url: https://www.google.com/
